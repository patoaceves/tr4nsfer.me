<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>tr4nsfer.me</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--teal:#00c896;--bg:#000;--muted:rgba(255,255,255,0.45);--text:#fff;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px 48px;}
    .geo-shape{position:absolute;bottom:-60px;pointer-events:none;animation:riseShape linear infinite;}
    @keyframes riseShape{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:1}88%{opacity:.6}100%{transform:translateY(-110vh) rotate(360deg);opacity:0}}
    @media(max-width:600px){body{justify-content:flex-start;padding-top:48px;}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes plCycle{0%{opacity:0}5%{opacity:1}89%{opacity:1}100%{opacity:0}}
    @keyframes plHoriz{0%,5%{stroke-dashoffset:737;animation-timing-function:cubic-bezier(.4,0,.2,1)}15%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    @keyframes plDiag{0%,15%{stroke-dashoffset:1762;animation-timing-function:cubic-bezier(.4,0,.2,1)}32%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    @keyframes plVert{0%,32%{stroke-dashoffset:750;animation-timing-function:cubic-bezier(.4,0,.2,1)}42%{stroke-dashoffset:0}100%{stroke-dashoffset:0}}
    @keyframes plDot{0%,42%{transform:scale(0);opacity:0;animation-timing-function:cubic-bezier(.34,1.56,.64,1)}51%{transform:scale(1);opacity:1}100%{transform:scale(1);opacity:1}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    #page-loader{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .35s ease,visibility .35s;}
    #page-loader.hide{opacity:0;visibility:hidden;pointer-events:none;}
    .pl-svg{width:88px;height:88px;filter:drop-shadow(0 0 22px rgba(0,200,150,.38));opacity:0;animation:plCycle 2.1s linear infinite;}
    .pl-stroke-horiz{stroke-dasharray:737;stroke-dashoffset:737;animation:plHoriz 2.1s linear infinite;}
    .pl-stroke-diag{stroke-dasharray:1762;stroke-dashoffset:1762;animation:plDiag 2.1s linear infinite;}
    .pl-stroke-vert{stroke-dasharray:750;stroke-dashoffset:750;animation:plVert 2.1s linear infinite;}
    .pl-dot{transform-box:fill-box;transform-origin:center;transform:scale(0);opacity:0;animation:plDot 2.1s linear infinite;}
    .state{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
    .state-title{font-size:15px;font-weight:600;color:var(--muted);}
    .state-sub{font-size:13px;color:rgba(255,255,255,.3);}
    #state-profile{display:none;width:100%;flex-direction:column;align-items:center;animation:fadeInUp .4s ease both;position:relative;z-index:2;}
    .card-wrap{width:100%;max-width:340px;position:relative;z-index:1;isolation:isolate;}
    .live-card{width:100%;aspect-ratio:1/1.2;border-radius:22px;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.1);cursor:default;}
    .card-design-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
    .lc-inner{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:space-between;height:100%;padding:20px 22px 24px;}
    .lc-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;}
    .lc-logo-sq{width:96px;height:96px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.30);display:none;flex-shrink:0;}
    .lc-logo-sq.visible{display:block;}
    .lc-logo-sq img{width:100%;height:100%;object-fit:cover;}
    /* Logo de tr4nsfer.me dentro de la card — SIEMPRE blanco */
    .lc-top-logo{height:14px;width:auto;display:block;opacity:.8;position:absolute;top:0;right:0;}
    .lc-middle{display:flex;flex-direction:column;flex:1;justify-content:space-evenly;padding:14px 0;}
    .lc-bank{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.40);border-radius:24px;padding:7px 16px 7px 8px;align-self:flex-start;}
    .lc-bank-icon{width:22px;height:22px;border-radius:5px;object-fit:contain;background:rgba(255,255,255,.95);padding:2px;display:none;}
    .lc-bank-name{font-size:16px;font-weight:600;opacity:.92;}
    .lc-group{display:flex;flex-direction:column;gap:4px;}
    .lc-section-label,.lc-clabe-label{font-size:11px;text-transform:uppercase;letter-spacing:.14em;opacity:.55;font-weight:600;}
    .lc-clabe{font-size:18px;font-weight:600;letter-spacing:.04em;font-family:'Inter',sans-serif;line-height:1.3;white-space:nowrap;}
    .lc-copy-row{display:flex;align-items:center;gap:8px;}
    .lc-copy-btn{background:none;border:none;cursor:pointer;padding:4px;opacity:.5;transition:opacity .15s;display:flex;align-items:center;}
    .lc-copy-btn:hover{opacity:1;}
    .lc-name{font-size:17px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-family:'Inter',sans-serif;white-space:nowrap;}
    .lc-negocio-name{font-size:14px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;font-family:'Inter',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lc-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
    .lc-alias{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.6);}
    .live-card.light-text{color:#fff;}
    .live-card.dark-text{color:#1a1a1a;}
    /* ACTIONS — glass con blur, menos transparencia, texto en color acento */
    .actions{width:100%;max-width:340px;margin-top:14px;display:flex;flex-direction:column;gap:8px;position:relative;z-index:2;}
    .action-row{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--card-row-bg,rgba(0,200,150,.20));
      border:1px solid var(--card-row-border,rgba(0,200,150,.32));
      border-radius:14px;padding:14px 16px;
      transition:background .3s,border-color .3s;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }
    .action-row-left{display:flex;flex-direction:column;gap:3px;min-width:0;}
    .action-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);}
    /* Valor: usa el color acento de la tarjeta, nunca negro */
    .action-value{font-size:14px;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;color:var(--card-accent,#00c896);}
    .btn-action{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.20);
      color:rgba(255,255,255,.92);
      border-radius:8px;padding:7px 14px;
      font-size:11px;font-weight:700;
      font-family:'Inter',sans-serif;cursor:pointer;
      transition:background .15s;white-space:nowrap;flex-shrink:0;
    }
    .btn-action:hover{background:rgba(255,255,255,.22);}
    .btn-action.copied{color:rgba(255,255,255,.4);}
    /* Adaptación fondo claro */
    body.bg-light{--muted:rgba(0,0,0,0.45);--text:#1a1a1a;}
    body.bg-light .action-label{color:rgba(0,0,0,.45);}
    body.bg-light .action-row{background:var(--card-row-bg);border-color:var(--card-row-border);}
    body.bg-light .btn-action{background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.16);color:rgba(0,0,0,.8);}
    /* Branding */
    .branding{margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:2;}
    .branding-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2);}
    .branding a{display:flex;align-items:center;gap:6px;text-decoration:none;opacity:.55;transition:opacity .2s;}
    .branding a:hover{opacity:1;}
    .branding img{height:12px;width:auto;}
    .branding-cta{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s;}
    .branding-cta:hover{color:rgba(0,200,150,.8);}
    body.bg-light .branding-label{color:rgba(0,0,0,.25);}
    body.bg-light .branding a{opacity:.6;}
    body.bg-light .branding-cta{color:rgba(0,0,0,.35);}
    /* Modal fiscal */
    .fiscal-overlay{position:fixed;inset:0;z-index:200;background:var(--fiscal-overlay-bg,rgba(0,0,0,.75));backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px;}
    .fiscal-overlay.visible{display:flex;}
    .fiscal-modal{background:var(--fiscal-modal-bg,#111);border:1px solid var(--fiscal-modal-border,rgba(255,255,255,.1));border-radius:18px;width:100%;max-width:360px;padding:24px 22px 20px;animation:fadeInUp .25s ease both;position:relative;overflow:hidden;}
    .fiscal-design-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.7;}
    .fiscal-modal-content{position:relative;z-index:1;}
    .fiscal-modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .fiscal-modal-title{font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--fiscal-title-color,#f0f0f0);}
    .fiscal-close{background:none;border:none;cursor:pointer;color:var(--fiscal-close-color,rgba(255,255,255,.4));padding:4px;transition:color .15s;display:flex;align-items:center;}
    .fiscal-close:hover{color:var(--fiscal-title-color,#fff);}
    .fiscal-row{padding:10px 12px;background:var(--fiscal-row-bg,rgba(255,255,255,.04));border:1px solid var(--fiscal-row-border,rgba(255,255,255,.07));border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .fiscal-row:last-of-type{margin-bottom:0;}
    .fiscal-row-inner{flex:1;min-width:0;}
    .fiscal-row-label{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--fiscal-label-color,rgba(255,255,255,.35));margin-bottom:3px;}
    .fiscal-row-value{font-size:13px;font-weight:500;color:var(--fiscal-value-color,rgba(255,255,255,.88));line-height:1.4;word-break:break-word;}
    .btn-fiscal-copy{background:var(--fiscal-row-bg,rgba(255,255,255,.08));border:1px solid var(--fiscal-row-border,rgba(255,255,255,.12));color:var(--card-accent,#00c896);border-radius:7px;padding:5px 11px;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;}
    .btn-fiscal-copy.copied{color:var(--fiscal-label-color,rgba(255,255,255,.35));}
    .fiscal-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px;color:rgba(255,255,255,.4);font-size:13px;}
    .fiscal-err{padding:16px;text-align:center;color:#f04040;font-size:13px;}
    .fiscal-expiry{font-size:10px;color:var(--fiscal-label-color,rgba(255,255,255,.25));text-align:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--fiscal-row-border,rgba(255,255,255,.07));}
    .spin-ring{display:inline-block;width:16px;height:16px;animation:spin .7s linear infinite;}
    @media(max-width:400px){.live-card{border-radius:18px;}.lc-clabe{font-size:17px;}.lc-name{font-size:16px;}}
  </style>
</head>

  {id:'barberia',svg:'<path d="M9.5 3 L14.5 3 Q15.5 3 15.5 4 L15.5 21 Q15.5 22 14.5 22 L9.5 22 Q8.5 22 8.5 21 L8.5 4 Q8.5 3 9.5 3 Z"/><path d="M8.5 7 Q12 9 15.5 11"/><path d="M8.5 12 Q12 14 15.5 16"/><path d="M8.5 17 Q12 19 15.5 21"/><path d="M8 3 L16 3"/><path d="M8 22 L16 22"/><circle cx="12" cy="1.8" r="1.5"/>'},

];
function iconSVG(icon,size,stroke,sw){return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none"><g stroke="'+(stroke||'rgba(255,255,255,0.9)')+'" stroke-width="'+(sw||1.2)+'" stroke-linecap="round" stroke-linejoin="round">'+icon.svg+'</g></svg>';}
const favicon=d=>'https://www.google.com/s2/favicons?domain='+d+'&sz=32';

const CARD_DESIGNS=[
  {id:'diagonal',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><polygon points="0,0 100,0 100,36 0,78" fill="rgba(255,255,255,0.09)"/><polygon points="62,0 100,0 100,24" fill="rgba(255,255,255,0.07)"/><polygon points="0,82 100,38 100,100 0,100" fill="rgba(255,255,255,0.05)"/></svg>`},
  {id:'aurora',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><defs><radialGradient id="au-a" cx="12%" cy="18%" r="60%"><stop offset="0%" stop-color="rgba(255,255,255,0.28)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient><radialGradient id="au-b" cx="88%" cy="82%" r="55%"><stop offset="0%" stop-color="rgba(255,255,255,0.20)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient></defs><rect width="100%" height="100%" fill="url(#au-a)"/><rect width="100%" height="100%" fill="url(#au-b)"/></svg>`},
  {id:'espiral',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><path d="M0,100 Q50,49 100,36" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="0.8"/><path d="M0,100 Q60,62 100,52" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.7"/><path d="M0,100 Q36,33 100,18" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.7"/></svg>`},
  {id:'cristal',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><polygon points="0,0 55,0 38,28 0,20" fill="rgba(255,255,255,0.13)"/><polygon points="55,0 100,0 78,30" fill="rgba(255,255,255,0.08)"/><polygon points="38,28 78,30 100,12 100,0 55,0" fill="rgba(255,255,255,0.10)"/><polygon points="0,20 38,28 22,62 0,52" fill="rgba(255,255,255,0.06)"/><polygon points="38,28 78,30 68,78 22,62" fill="rgba(255,255,255,0.04)"/><polygon points="0,82 22,62 68,78 100,96 100,100 0,100" fill="rgba(255,255,255,0.05)"/></svg>`},
  {id:'topografico',render:()=>`<svg viewBox="0 0 100 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;"><ellipse cx="50" cy="60" rx="90" ry="62" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.2"/><ellipse cx="50" cy="60" rx="72" ry="50" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="1.0"/><ellipse cx="50" cy="60" rx="55" ry="38" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.9"/><ellipse cx="50" cy="60" rx="38" ry="26" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/><ellipse cx="50" cy="60" rx="22" ry="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.7"/><ellipse cx="50" cy="60" rx="9" ry="6" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/></svg>`},
  {id:'solido',render:()=>''},
];

const CARD_PRESETS=[
  {value:'linear-gradient(135deg,#004d38,#00c896)',solid:'#00a87a',accent:'#00c896'},
  {value:'linear-gradient(135deg,#0d0d0d,#1f1f1f)',solid:'#000000',accent:'#aaaaaa'},
  {value:'linear-gradient(135deg,#7a2050,#e8719a)',solid:'#c0537a',accent:'#e8719a'},
  {value:'linear-gradient(135deg,#0f3460,#1a6fb5)',solid:'#145a96',accent:'#5baee0'},
  {value:'linear-gradient(135deg,#2d1b69,#8b5cf6)',solid:'#5b3fcb',accent:'#8b5cf6'},
  {value:'linear-gradient(135deg,#7c2d12,#f97316)',solid:'#c45c1a',accent:'#f97316'},
];

const LADAS_2D=new Set(['55','56','81','33','99']);
function fmtWA(d){if(!d)return '';var l2=d.substring(0,2);if(LADAS_2D.has(l2))return [d.substring(0,2),d.substring(2,6),d.substring(6,10)].filter(function(p){return p;}).join(' ');return [d.substring(0,3),d.substring(3,6),d.substring(6,10)].filter(function(p){return p;}).join(' ');}
function fmt(c){return c.replace(/(\d{3})(\d{3})(\d{11})(\d{1})/,'$1 $2 $3 $4');}

function copyAction(textId,btn,rawAttr){var el=document.getElementById(textId);if(!el)return;var val=rawAttr&&el.dataset[rawAttr]?el.dataset[rawAttr]:el.textContent.trim();navigator.clipboard.writeText(val).then(function(){btn.textContent='\u2713 Copiado';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copiar';btn.classList.remove('copied');},2000);});}

function getCardColorVars(cg){
  var preset=CARD_PRESETS.find(function(p){return p.value===cg;});
  if(preset)return{rgb:hexToRgb(preset.solid||preset.value),accent:preset.accent||preset.solid};
  var m=cg.match(/#[0-9a-fA-F]{6}/g),e=m?m[m.length-1]:'#00c896';
  return{rgb:hexToRgb(e),accent:e};
}
function hexToRgb(hex){var h=(hex.match(/#[0-9a-fA-F]{6}/)||['#00c896'])[0];var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r+','+g+','+b;}

var currentSlug='';
const REGIMEN_LABELS={'601':'General de Ley PM','612':'Actividades Empresariales','621':'Incorporaci\u00f3n Fiscal','626':'RESICO','605':'Sueldos y Salarios','606':'Arrendamiento','608':'D\u00e9mas ingresos','616':'Sin obligaciones fiscales','622':'Act. Agr\u00edc., Ganaderas','625':'Plataformas Tecnol\u00f3gicas','603':'PM sin Fines de Lucro'};

function copyFiscalRow(btn){var val=btn.getAttribute('data-copy')||'';navigator.clipboard.writeText(val).then(function(){btn.textContent='\u2713';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copiar';btn.classList.remove('copied');},2000);});}

function openFiscalModal(){
  var fdl=$('fiscal-design-layer');
  if(fdl&&typeof _currentCardDesign!=='undefined'){fdl.innerHTML=CARD_DESIGNS[_currentCardDesign].render();}
  $('fiscal-overlay').classList.add('visible');
  $('fiscal-body').innerHTML='<div class="fiscal-loading"><svg class="spin-ring" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="rgba(0,200,150,0.25)" stroke-width="2"/><path d="M8 2 A6 6 0 0 1 14 8" stroke="#00c896" stroke-width="2" stroke-linecap="round"/></svg>Verificando acceso\u2026</div>';
  loadFiscalData();
}
function closeFiscalModal(){$('fiscal-overlay').classList.remove('visible');}
function onOverlayClick(e){if(e.target===$('fiscal-overlay'))closeFiscalModal();}

async function loadFiscalData(){
  try{
    var tr=await fetch(SUPABASE_URL+'/functions/v1/get-fiscal-token',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify({slug:currentSlug})});
    if(!tr.ok)throw new Error('No se pudo obtener acceso.');
    var tj=await tr.json();if(tj.error||!tj.token)throw new Error(tj.error||'Token inv\u00e1lido');
    var dr=await fetch(SUPABASE_URL+'/functions/v1/get-fiscal-data',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify({token:tj.token})});
    if(!dr.ok)throw new Error('Error al obtener datos.');
    var fd=await dr.json();if(fd.error)throw new Error(fd.error);
    var rows=[
      [fd.razon_social,'Raz\u00f3n social'],
      [fd.rfc,'RFC'],
      [fd.regimen_fiscal?(REGIMEN_LABELS[fd.regimen_fiscal]||fd.regimen_fiscal)+' ('+fd.regimen_fiscal+')':null,'R\u00e9gimen fiscal'],
      [fd.calle_fiscal,'Calle y n\u00famero'],
      [fd.colonia_fiscal,'Colonia'],
      [fd.ciudad_fiscal,'Ciudad'],
      [fd.estado_fiscal,'Estado'],
      [fd.cp_fiscal,'C\u00f3digo postal'],
    ].filter(function(r){return r[0];});
    var html=rows.map(function(r,i){
      return '<div class="fiscal-row"><div class="fiscal-row-inner"><div class="fiscal-row-label">'+r[1]+'</div><div class="fiscal-row-value">'+r[0]+'</div></div><button class="btn-fiscal-copy" id="fcb'+i+'" onclick="copyFiscalRow(this)">Copiar</button></div>';
    }).join('')+'<div class="fiscal-expiry">&#128274; Datos cifrados &middot; Esta sesi&oacute;n expira en 15 min</div>';
    $('fiscal-body').innerHTML=html;
    rows.forEach(function(r,i){var b=document.getElementById('fcb'+i);if(b)b.setAttribute('data-copy',r[0]);});
  }catch(e){$('fiscal-body').innerHTML='<div class="fiscal-err">'+e.message+'</div>';}
}

function renderProfile(d){
  currentSlug=d.custom_slug||d.slug||'';
  var card=$('live-card');
  var di=Math.min(d.card_design||0,CARD_DESIGNS.length-1);
  window._currentCardDesign=di;
  var isSolido=CARD_DESIGNS[di].id==='solido';
  var cg=d.card_gradient||'linear-gradient(135deg,#004d38,#00c896)';
  var preset=CARD_PRESETS.find(function(p){return p.value===cg;});

  // Color de la card
  card.style.background=(isSolido&&preset)?preset.solid:cg;

  // Fondo de página
  var bgHex=(d.bg_color||'#000000').replace('#','').padEnd(6,'0');
  var bgR=parseInt(bgHex.substring(0,2),16)||0,bgG=parseInt(bgHex.substring(2,4),16)||0,bgB=parseInt(bgHex.substring(4,6),16)||0;
  var isLightBg=(0.299*bgR+0.587*bgG+0.114*bgB)/255>=0.5;
  document.body.classList.toggle('bg-light',isLightBg);
  document.body.style.background=d.bg_color||'#000';

  // Logo branding — adapta al fondo de página
  var brLogo=$('branding-logo');if(brLogo)brLogo.src=isLightBg?'logo.png':'logo-white.png';
  // Logo DENTRO de la card — SIEMPRE blanco (ya está hardcodeado en el HTML)

  // Vars de color de tarjeta
  var cv=getCardColorVars(cg);
  document.documentElement.style.setProperty('--card-row-bg','rgba('+cv.rgb+',.20)');
  document.documentElement.style.setProperty('--card-row-border','rgba('+cv.rgb+',.32)');
  document.documentElement.style.setProperty('--card-accent',cv.accent);

  // Fiscal modal theming
  var oR=bgR,oG=bgG,oB=bgB;
  document.documentElement.style.setProperty('--fiscal-overlay-bg','rgba('+oR+','+oG+','+oB+',.88)');
  var cgHexes=cg.match(/#([0-9a-fA-F]{6})/g)||['#111111'];
  var modalBg=cgHexes[0];var mHex=modalBg.replace('#','');
  var mR=parseInt(mHex.substring(0,2),16)||0,mG=parseInt(mHex.substring(2,4),16)||0,mB=parseInt(mHex.substring(4,6),16)||0;
  var mLight=(0.299*mR+0.587*mG+0.114*mB)/255>=0.5;
  document.documentElement.style.setProperty('--fiscal-modal-bg',(isSolido&&preset)?preset.solid:cg);
  document.documentElement.style.setProperty('--fiscal-modal-border','rgba('+(mLight?'0,0,0':'255,255,255')+',.15)');
  document.documentElement.style.setProperty('--fiscal-row-bg','rgba('+(mLight?'0,0,0':'255,255,255')+','+(mLight?'.06':'.04')+')');
  document.documentElement.style.setProperty('--fiscal-row-border','rgba('+(mLight?'0,0,0':'255,255,255')+','+(mLight?'.12':'.08')+')');
  document.documentElement.style.setProperty('--fiscal-label-color',mLight?'rgba(0,0,0,.4)':'rgba(255,255,255,.35)');
  document.documentElement.style.setProperty('--fiscal-value-color',mLight?'rgba(0,0,0,.85)':'rgba(255,255,255,.88)');
  document.documentElement.style.setProperty('--fiscal-close-color',mLight?'rgba(0,0,0,.4)':'rgba(255,255,255,.4)');
  document.documentElement.style.setProperty('--fiscal-title-color',mLight?'#1a1a1a':'#f0f0f0');

  // Texto claro/oscuro en card
  var m=((isSolido&&preset)?preset.solid:cg).match(/#([0-9a-f]{6})/i);
  if(m){var n=parseInt(m[1],16),lum=(0.299*(n>>16)+0.587*((n>>8)&0xff)+0.114*(n&0xff))/255;card.classList.toggle('light-text',lum<.5);card.classList.toggle('dark-text',lum>=.5);}

  $('card-design-layer').innerHTML=CARD_DESIGNS[di].render();

  // Logo negocio
  if(d.logo_url){$('lc-logo-img').src=d.logo_url;$('lc-logo-sq').classList.add('visible');}

  // Nombre negocio
  if(d.nombre_negocio){$('lc-negocio-name').textContent=d.nombre_negocio.toUpperCase();$('lc-negocio-group').style.display='flex';}

  // Banco
  if(d.banco){$('lc-bank-name').textContent=d.banco;if(d.banco_domain){var ic=$('lc-bank-icon');ic.src=favicon(d.banco_domain);ic.style.display='block';}$('lc-bank').style.display='flex';}
  else $('lc-bank').style.display='none';

  // CLABE
  var clabeRaw=d.clabe||'';$('lc-clabe').textContent=fmt(clabeRaw);
  $('card-copy-clabe').onclick=function(){navigator.clipboard.writeText(clabeRaw).then(function(){$('card-copy-clabe').style.opacity='.2';setTimeout(function(){$('card-copy-clabe').style.opacity='.5';},500);});};

  // Titular
  var nom=d.titular_cuenta||'';$('lc-name').textContent=nom;if(nom.length>25)$('lc-name').style.fontSize='14px';
  $('card-copy-nombre').onclick=function(){navigator.clipboard.writeText(nom).then(function(){$('card-copy-nombre').style.opacity='.2';setTimeout(function(){$('card-copy-nombre').style.opacity='.5';},500);});};

  if(d.alias)$('lc-alias').textContent=d.alias;

  // Acciones
  var any=false;
  if(d.whatsapp&&d.show_whatsapp!==false){
    var wd=d.whatsapp.length>10?d.whatsapp.slice(-10):d.whatsapp;
    var wt=$('act-wa-text');wt.textContent='+52 '+fmtWA(wd);wt.dataset.rawWa=d.whatsapp;
    $('row-wa').style.display='flex';any=true;
  }
  if(d.email&&d.show_email!==false){$('act-email-text').textContent=d.email;$('row-email').style.display='flex';any=true;}
  if(d.has_fiscal){$('row-fiscal').style.display='flex';any=true;}
  if(any)$('actions').style.display='flex';

  // Íconos flotantes en fondo — con strokeWidth más visible
  if(d.icon_id){
    var iconData=INDUSTRY_ICONS.find(function(i){return i.id===d.icon_id;});
    if(iconData){
      var shapes=document.getElementById('shapes');
      if(shapes){
        // Limpiar shapes anteriores
        while(shapes.firstChild)shapes.removeChild(shapes.firstChild);
        var icol=d.icon_color||'rgba(255,255,255,0.55)';
        for(var ci=0;ci<14;ci++){
          var sz=Math.round(18+Math.random()*32);
          var left=(ci*(92/14)+2+Math.random()*5).toFixed(2);
          var dur=(14+(ci%5)*2.4+Math.random()*4).toFixed(1);
          var del=(-(ci*(parseFloat(dur)/14))-Math.random()*5).toFixed(1);
          var el=document.createElement('div');
          el.className='geo-shape';
          el.style.cssText='left:'+left+'%;animation-duration:'+dur+'s;animation-delay:'+del+'s;width:'+sz+'px;height:'+sz+'px;';
          el.innerHTML=iconSVG(iconData,sz,icol,1.2);
          shapes.appendChild(el);
        }
      }
    }
  }

  hideLoader();
  $('state-profile').style.display='flex';
}

var _done=false,_dismissed=false,_cb=null;
(function(){
  var L=$('page-loader');if(!L)return;
  L.querySelector('.pl-svg').addEventListener('animationiteration',function(e){
    if(e.animationName!=='plCycle'||_dismissed)return;
    if(_done){_dismissed=true;L.classList.add('hide');setTimeout(function(){if(L.parentNode)L.parentNode.removeChild(L);if(_cb){var c=_cb;_cb=null;c();}},380);}
  });
})();
function hideLoader(cb){_cb=cb||null;_done=true;}

async function init(){
  var p=new URLSearchParams(window.location.search);
  var slug=p.get('id')||window.location.pathname.replace(/\//g,'').split('?')[0];
  if(!slug){hideLoader(function(){$('state-error').style.display='flex';});return;}
  try{
    var r=await fetch(SUPABASE_URL+'/functions/v1/get-link?slug='+slug,{headers:{'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
    if(!r.ok)throw 0;
    var d=await r.json();
    if(!d||d.error)throw 0;
    renderProfile(d);
  }catch(e){hideLoader(function(){$('state-error').style.display='flex';});}
}
init();
</script>
