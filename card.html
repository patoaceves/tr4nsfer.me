<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>tr4nsfer.me</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--teal:#00c896;--bg:#000;--surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--muted:rgba(255,255,255,0.45);--text:#fff;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 40px;}

    /* ── LOADING / ERROR ── */
    .state{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
    .spinner-ring{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .state-title{font-size:15px;font-weight:600;color:var(--muted);}
    .state-sub{font-size:13px;color:rgba(255,255,255,0.3);}

    /* ── CARD ── */
    .card-wrap{width:100%;max-width:340px;}
    .live-card{width:100%;aspect-ratio:1/1.2;border-radius:22px;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 90px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.1);cursor:default;}
    .card-design-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
    .lc-inner{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:space-between;height:100%;padding:20px 22px 24px;}
    .lc-top img{height:14px;width:auto;display:block;opacity:0.8;}
    .lc-middle{display:flex;flex-direction:column;flex:1;justify-content:space-evenly;padding:14px 0;}
    .lc-bank{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.22);border-radius:24px;padding:7px 16px 7px 8px;align-self:flex-start;}
    .lc-bank-icon{width:22px;height:22px;border-radius:5px;object-fit:contain;background:rgba(255,255,255,0.15);display:none;}
    .lc-bank-name{font-size:16px;font-weight:600;opacity:0.92;letter-spacing:0.01em;}
    .lc-group{display:flex;flex-direction:column;gap:4px;}
    .lc-section-label,.lc-clabe-label{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;opacity:0.55;font-weight:600;}
    .lc-clabe{font-size:18px;font-weight:600;letter-spacing:0.04em;font-family:'Inter',sans-serif;line-height:1.3;white-space:nowrap;}
    .lc-copy-row{display:flex;align-items:center;gap:8px;}
    .lc-copy-btn{background:none;border:none;cursor:pointer;padding:4px;opacity:0.5;transition:opacity .15s;display:flex;align-items:center;}
    .lc-copy-btn:hover{opacity:1;}
    .lc-name{font-size:17px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;font-family:'Inter',sans-serif;white-space:nowrap;}
    .lc-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
    .lc-alias{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.6);}

    /* ── ACTIONS ── */
    .actions{width:100%;max-width:340px;margin-top:20px;display:flex;flex-direction:column;gap:10px;}
    .action-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
    .action-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
    .action-value{font-size:14px;font-weight:600;letter-spacing:0.02em;}
    .action-value.mono{font-variant-numeric:tabular-nums;letter-spacing:0.06em;}
    .btn-copy{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:#fff;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;letter-spacing:0.04em;}
    .btn-copy:hover{background:rgba(255,255,255,0.14);}
    .btn-copy.copied{background:var(--teal);color:#000;border-color:var(--teal);}
    .btn-wa{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:#25d366;color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .15s;letter-spacing:-0.01em;}
    .btn-wa:hover{opacity:.88;}
    .btn-wa svg{flex-shrink:0;}

    /* ── BRANDING ── */
    .branding{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:6px;}
    .branding-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.2);}
    .branding a{display:flex;align-items:center;gap:6px;text-decoration:none;opacity:0.55;transition:opacity .2s;}
    .branding a:hover{opacity:1;}
    .branding img{height:12px;width:auto;}

    /* ── MOBILE ── */
    @media(max-width:400px){
      .live-card{border-radius:18px;}
      .lc-clabe{font-size:17px;}
      .lc-name{font-size:16px;}
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="state-loading" class="state">
    <div class="spinner-ring"></div>
    <div class="state-title">Cargando perfil…</div>
  </div>

  <!-- ERROR -->
  <div id="state-error" class="state" style="display:none;">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/></svg>
    <div class="state-title">Perfil no encontrado</div>
    <div class="state-sub">Este link puede haber expirado o no existe.</div>
  </div>

  <!-- PROFILE -->
  <div id="state-profile" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">

    <div class="card-wrap">
      <div class="live-card light-text" id="live-card">
        <div class="card-design-layer" id="card-design-layer"></div>
        <div class="lc-inner">
          <div class="lc-top"><img src="logo-white.png" alt="tr4nsfer.me"/></div>
          <div class="lc-middle">
            <div class="lc-bank" id="lc-bank">
              <img class="lc-bank-icon" id="lc-bank-icon" src="" alt="" />
              <span class="lc-bank-name" id="lc-bank-name">—</span>
            </div>
            <div class="lc-group">
              <div class="lc-clabe-label">CLABE</div>
              <div class="lc-copy-row">
                <div class="lc-clabe" id="lc-clabe"></div>
                <button class="lc-copy-btn" id="card-copy-clabe" title="Copiar CLABE">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="white" stroke-width="2"/><path d="M5 15H4C2.9 15 2 14.1 2 13V4C2 2.9 2.9 2 4 2H13C14.1 2 15 2.9 15 4V5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>
            <div class="lc-group">
              <div class="lc-section-label">TITULAR DE LA CUENTA</div>
              <div class="lc-copy-row">
                <div class="lc-name" id="lc-name"></div>
                <button class="lc-copy-btn" id="card-copy-nombre" title="Copiar nombre">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="white" stroke-width="2"/><path d="M5 15H4C2.9 15 2 14.1 2 13V4C2 2.9 2.9 2 4 2H13C14.1 2 15 2.9 15 4V5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="lc-bottom">
            <div class="lc-alias" id="lc-alias"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ACTION ROWS -->
    <div class="actions">
      <div class="action-row">
        <div>
          <div class="action-label">CLABE interbancaria</div>
          <div class="action-value mono" id="act-clabe"></div>
        </div>
        <button class="btn-copy" id="btn-copy-clabe" onclick="copyText('act-clabe','btn-copy-clabe')">Copiar</button>
      </div>
      <div class="action-row">
        <div>
          <div class="action-label">Titular de la cuenta</div>
          <div class="action-value" id="act-nombre"></div>
        </div>
        <button class="btn-copy" id="btn-copy-nombre" onclick="copyText('act-nombre','btn-copy-nombre')">Copiar</button>
      </div>
      <div class="action-row" id="row-banco" style="display:none;">
        <div>
          <div class="action-label">Banco</div>
          <div class="action-value" id="act-banco"></div>
        </div>
      </div>
      <button class="btn-wa" id="btn-wa" style="display:none;" onclick="openWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.998 2C6.477 2 2 6.477 2 12c0 1.84.494 3.564 1.354 5.054L2 22l5.1-1.335A9.956 9.956 0 0011.998 22c5.522 0 10-4.477 10-10S17.52 2 11.998 2zm0 18.18a8.18 8.18 0 01-4.18-1.148l-.3-.178-3.027.793.808-2.952-.196-.31A8.18 8.18 0 1111.998 20.18z"/></svg>
        Enviar datos por WhatsApp
      </button>
    </div>

    <!-- BRANDING -->
    <div class="branding">
      <div class="branding-label">Creado con</div>
      <a href="/" target="_blank">
        <img src="logo-white.png" alt="tr4nsfer.me" />
      </a>
    </div>

  </div>

<script>
  const SUPABASE_URL='https://wtmwwbsjwdisalnzlsnc.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0bXd3YnNqd2Rpc2Fsbnpsc25jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTkyMzYsImV4cCI6MjA4ODEzNTIzNn0.3qpiZxBW5vemXZyW7qD8P9s94_Oi5CrwZQUkkFLL_ck';
  const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  const $=id=>document.getElementById(id);
  const favicon=d=>`https://www.google.com/s2/favicons?domain=${d}&sz=32`;

  const CARD_DESIGNS=[
    {id:'diagonal',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><polygon points="0,0 100,0 100,36 0,78" fill="rgba(255,255,255,0.09)"/><polygon points="62,0 100,0 100,24" fill="rgba(255,255,255,0.07)"/><polygon points="0,82 100,38 100,100 0,100" fill="rgba(255,255,255,0.05)"/></svg>`},
    {id:'aurora',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><defs><radialGradient id="au-a" cx="12%" cy="18%" r="60%"><stop offset="0%" stop-color="rgba(255,255,255,0.28)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient><radialGradient id="au-b" cx="88%" cy="82%" r="55%"><stop offset="0%" stop-color="rgba(255,255,255,0.20)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></radialGradient></defs><rect width="100%" height="100%" fill="url(#au-a)"/><rect width="100%" height="100%" fill="url(#au-b)"/></svg>`},
    {id:'espiral',render:()=>`<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;"><path d="M0,100 Q50,49 100,36" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="0.8"/><path d="M0,100 Q60,62 100,52" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.7"/><path d="M0,100 Q36,33 100,18" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.7"/></svg>`},
    {id:'solido',render:()=>``},
  ];

  let _waNumber='';

  function fmt(clabe){return clabe.replace(/(\d{3})(\d{3})(\d{11})(\d{1})/,'$1 $2 $3 $4');}

  function copyText(fieldId,btnId){
    const val=$('act-clabe')&&fieldId==='act-clabe'?$('act-clabe').textContent.replace(/\s/g,''):$(fieldId).textContent;
    navigator.clipboard.writeText(val).then(()=>{
      const b=$(btnId); b.textContent='✓ Copiado'; b.classList.add('copied');
      setTimeout(()=>{b.textContent='Copiar';b.classList.remove('copied');},2000);
    });
  }

  function openWhatsApp(){
    window.open(`https://wa.me/52${_waNumber}`,'_blank');
  }

  function renderProfile(d){
    // Card background
    const card=$('live-card');
    const isSolido=CARD_DESIGNS[d.card_design||0]&&CARD_DESIGNS[d.card_design||0].id==='solido';
    const PRESETS=[
      {value:'linear-gradient(135deg,#004d38,#00c896)',solid:'#00a87a'},
      {value:'linear-gradient(135deg,#0d0d0d,#1f1f1f)',solid:'#000000'},
      {value:'linear-gradient(135deg,#7a2050,#e8719a)',solid:'#c0537a'},
      {value:'linear-gradient(135deg,#0f3460,#1a6fb5)',solid:'#145a96'},
    ];
    const cg=d.card_gradient||'linear-gradient(135deg,#004d38,#00c896)';
    const preset=PRESETS.find(p=>p.value===cg);
    card.style.background=(isSolido&&preset)?preset.solid:cg;
    document.body.style.background=d.bg_color||'#000';

    // Card design layer
    const dl=$('card-design-layer');
    dl.innerHTML=CARD_DESIGNS[d.card_design||0].render();

    // Bank
    if(d.banco){
      $('lc-bank-name').textContent=d.banco;
      if(d.banco_domain){const icon=$('lc-bank-icon');icon.src=favicon(d.banco_domain);icon.style.display='block';}
      $('lc-bank').style.display='flex';
    } else {
      $('lc-bank').style.display='none';
    }

    // CLABE
    const clabeRaw=d.clabe||'';
    $('lc-clabe').textContent=fmt(clabeRaw);
    $('act-clabe').textContent=fmt(clabeRaw);
    $('card-copy-clabe').onclick=()=>{
      navigator.clipboard.writeText(clabeRaw).then(()=>{
        $('card-copy-clabe').style.opacity='0.2';
        setTimeout(()=>$('card-copy-clabe').style.opacity='0.5',500);
      });
    };

    // Nombre
    const nom=d.titular_cuenta||'';
    $('lc-name').textContent=nom;
    if(nom.length>25) $('lc-name').style.fontSize='14px';
    $('act-nombre').textContent=nom;
    $('card-copy-nombre').onclick=()=>{
      navigator.clipboard.writeText(nom).then(()=>{
        $('card-copy-nombre').style.opacity='0.2';
        setTimeout(()=>$('card-copy-nombre').style.opacity='0.5',500);
      });
    };

    // Alias
    if(d.alias){$('lc-alias').textContent=d.alias;}

    // Banco row
    if(d.banco){$('act-banco').textContent=d.banco;$('row-banco').style.display='flex';}

    // WhatsApp
    if(d.whatsapp){_waNumber=d.whatsapp;$('btn-wa').style.display='flex';}

    // Show profile
    $('state-loading').style.display='none';
    const prof=$('state-profile');
    prof.style.display='flex';
  }

  async function init(){
    const params=new URLSearchParams(window.location.search);
    const slug=params.get('id') || window.location.pathname.replace(/\//g,'').split('?')[0];
    if(!slug){$('state-loading').style.display='none';$('state-error').style.display='flex';return;}
    const resp=await fetch(`https://wtmwwbsjwdisalnzlsnc.supabase.co/functions/v1/get-link?slug=${slug}`,{headers:{'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
    if(!resp.ok){$('state-loading').style.display='none';$('state-error').style.display='flex';return;}
    const data=await resp.json();
    if(!data||data.error){$('state-loading').style.display='none';$('state-error').style.display='flex';return;}
    renderProfile(data);
  }

  init();
</script>
</body>
</html>
